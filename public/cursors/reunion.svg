<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">
  <!-- Imite l'emoji 🇷🇪 (drapeau régional 'Volcan' style Twemoji) en SVG
       compact 14x14. cursor: url() ne supporte pas l'emoji unicode
       directement, donc c'est l'approximation vectorielle la plus fidèle. -->
  <rect x="0" y="0" width="14" height="14" rx="2" fill="#FFFFFF"/>
  <rect x="0" y="0" width="14" height="3" fill="#0E1F52"/>
  <rect x="0" y="3" width="14" height="3" fill="#1E4596"/>
  <rect x="0" y="6" width="14" height="2" fill="#4D8AC9"/>
  <path d="M0 14 L7 6 L14 14 Z" fill="#DC4A2A"/>
  <line x1="7" y1="6" x2="3" y2="2"   stroke="#FCD34D" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="6" x2="7" y2="0.5" stroke="#FCD34D" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="7" y1="6" x2="11" y2="2"  stroke="#FCD34D" stroke-width="0.5" stroke-linecap="round"/>
  <rect x="0.25" y="0.25" width="13.5" height="13.5" rx="1.75" fill="none" stroke="#0B1437" stroke-width="0.4" opacity="0.5"/>
</svg>
